[build]
builder = "NIXPACKS"

[[services]]
name = "backend"
source = "backend"

[services.build]
buildCommand = "pip install . && alembic upgrade head"

[services.deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30

[[services]]
name = "arq-worker"
source = "backend"

[services.deploy]
startCommand = "python -m arq app.tasks.worker.WorkerSettings"

[[services]]
name = "frontend"
source = "frontend"

[services.build]
buildCommand = "npm ci && npm run build"

[services.deploy]
startCommand = "node .next/standalone/server.js"
